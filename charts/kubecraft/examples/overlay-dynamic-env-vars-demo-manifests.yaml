---
# Source: kubecraft/templates/configmap-overlay-env-vars.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ensaio-demo-runtime-env-vars
  namespace: default
data:
  LOG_LEVEL: "debug"
---
# Source: kubecraft/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app/name: ensaio-demo-api
    app/realm: sandbox
    app/subset: main
  name: ensaio-demo-api
  namespace: default
spec:
  selector:
    matchLabels:
      app/name: ensaio-demo-api
      app/subset: main
  template:    
    metadata:
      annotations:
        kubecraft.io/overlays-checksum: 89357208dc0da66cbc4b7bda5d97080cfccb6abfe70944f8cbb88b3d0c149747
      labels:
        app/name: ensaio-demo-api
        app/realm: sandbox
        app/subset: main
    spec:
      containers:
      - env:
        - name: REALM_CONTEXT_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app/realm']
        - name: LOG_LEVEL
          value: info
        - name: ENVIRONMENT
          value: $(REALME_CONTEXT_NAME)
        - name: SERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app.kubernetes.io/name']
        envFrom:
        - configMapRef:
            name: ensaio-demo-runtime-env-vars
        image: python:3.12-alpine
        name: app
